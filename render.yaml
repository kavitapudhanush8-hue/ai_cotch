services:
  # Combined Frontend + Backend using Docker
  - type: web
    name: ai-cotch
    runtime: docker
    repo: https://github.com/kavitapudhanush8-hue/ai_cotch.git
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
